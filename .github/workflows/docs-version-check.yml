name: Docs Version Consistency

on:
  push:
    branches:
      - main
    paths:
      - 'src/lib/version.ts'
      - 'README.md'
      - 'docs/NOW.md'
      - 'docs/GUIDES.md'
      - 'docs/CHANGELOG.md'
      - 'scripts/check-doc-version-consistency.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-version-check.yml'
  pull_request:
    paths:
      - 'src/lib/version.ts'
      - 'README.md'
      - 'docs/NOW.md'
      - 'docs/GUIDES.md'
      - 'docs/CHANGELOG.md'
      - 'scripts/check-doc-version-consistency.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-version-check.yml'

jobs:
  check-docs-version:
    name: Check docs version markers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate version consistency
        run: npm run check:docs-version
