name: Domain Monitoring Cron

on:
  schedule:
    # Runs every 1 hour for batch rotation (B1-B4)
    # Batch rotation: 00:00(B1), 01:00(B2), 02:00(B3), 03:00(B4), 04:00(B1), repeat...
    # Per run: ~79 domains × ~2.4 min actual | 24 runs/day × 2.4 min = 1,728 min/month (86% quota)
    - cron: '0 * * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Timeout after 5 minutes to prevent hanging
    timeout-minutes: 5
    
    steps:
      - name: Evaluate monitoring toggle
        id: monitor_toggle
        env:
          MONITORING_ENABLED: ${{ vars.MONITORING_ENABLED }}
        run: |
          enabled="${MONITORING_ENABLED:-true}"
          enabled="$(echo "$enabled" | tr '[:upper:]' '[:lower:]' | xargs)"

          if [ "$enabled" = "false" ] || [ "$enabled" = "0" ] || [ "$enabled" = "off" ] || [ "$enabled" = "no" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Monitoring disabled by MONITORING_ENABLED=$enabled"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Monitoring enabled by MONITORING_ENABLED=${enabled:-true}"
          fi

      - name: Checkout code
        if: steps.monitor_toggle.outputs.should_run == 'true'
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        if: steps.monitor_toggle.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install only monitoring dependencies
        if: steps.monitor_toggle.outputs.should_run == 'true'
        run: |
          npm install --no-save firebase firebase-admin node-fetch

      - name: Monitoring is disabled
        if: steps.monitor_toggle.outputs.should_run != 'true'
        run: |
          echo "Skipping monitoring run. Set repository variable MONITORING_ENABLED=true to re-enable."
      
      - name: Run domain monitoring
        if: steps.monitor_toggle.outputs.should_run == 'true'
        timeout-minutes: 4
        env:
          MONITORING_ENABLED: ${{ vars.MONITORING_ENABLED }}
          MONITORING_PAUSE_UNTIL: ${{ vars.MONITORING_PAUSE_UNTIL }}
          MONITORING_QUOTA_GRACEFUL_EXIT: ${{ vars.MONITORING_QUOTA_GRACEFUL_EXIT }}
          STATS_HEARTBEAT_HOURS: ${{ vars.STATS_HEARTBEAT_HOURS }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_CRON_EMAIL: ${{ secrets.FIREBASE_CRON_EMAIL }}
          FIREBASE_CRON_PASSWORD: ${{ secrets.FIREBASE_CRON_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/monitor-cron.js
      
      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-logs
          path: |
            *.log
          retention-days: 7
