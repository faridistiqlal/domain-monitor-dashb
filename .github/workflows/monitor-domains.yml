name: Domain Monitoring Cron

on:
  # TEMPORARILY DISABLED - Waiting for February quota reset
  # schedule:
  #   # Runs every 20 minutes
  #   - cron: '*/20 * * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Timeout after 5 minutes to prevent hanging
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install only monitoring dependencies
        run: |
          npm install --no-save firebase node-fetch
      
      - name: Run domain monitoring
        timeout-minutes: 4
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/monitor-cron.js
      
      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-logs
          path: |
            *.log
          retention-days: 7
