name: Domain Monitoring Cron

on:
  schedule:
    # Runs every 1 hour for batch rotation (B1-B4)
    # Batch rotation: 00:00(B1), 01:00(B2), 02:00(B3), 03:00(B4), 04:00(B1), repeat...
    # Per run: ~79 domains × ~2.4 min actual | 24 runs/day × 2.4 min = 1,728 min/month (86% quota)
    - cron: '0 * * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Timeout after 5 minutes to prevent hanging
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install only monitoring dependencies
        run: |
          npm install --no-save firebase firebase-admin node-fetch
      
      - name: Run domain monitoring
        timeout-minutes: 4
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_CRON_EMAIL: ${{ secrets.FIREBASE_CRON_EMAIL }}
          FIREBASE_CRON_PASSWORD: ${{ secrets.FIREBASE_CRON_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/monitor-cron.js
      
      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-logs
          path: |
            *.log
          retention-days: 7
