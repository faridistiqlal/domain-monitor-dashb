services:
  # Cron Job for Domain Monitoring
  - type: cron
    name: kendal-domain-monitor
    runtime: node
    schedule: "*/20 * * * *"  # Every 20 minutes
    buildCommand: npm install
    startCommand: node scripts/monitor-cron.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_API_KEY
        sync: false  # Will be set in Render dashboard
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: kendal-monitor
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false  # Optional, set if you want Slack notifications
